name: Isabelle

on:
  push:
    paths:
      - "provers/isabelle/**"
      - ".github/workflows/isabelle.yml"
  pull_request:
    paths:
      - "provers/isabelle/**"
      - ".github/workflows/isabelle.yml"
  workflow_dispatch:

jobs:
  isabelle:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Build TheoremDNA session with Isabelle2025-2
        run: |
          docker run --rm \
            --mount "type=bind,source=$GITHUB_WORKSPACE,target=/workspace,readonly" \
            makarius/isabelle:Isabelle2025-2@sha256:9bd33b183c399327c5d554fc8cde27c29b5d2b20cdc6fe7a604caa3f951018fc \
            build -D /workspace/provers/isabelle TheoremDNA
