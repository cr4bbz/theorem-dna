name: Ledger

on:
  push:
    paths:
      - "schema/**"
      - "ledger/**"
      - "examples/**"
      - "tools/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ledger.yml"
  pull_request:
    paths:
      - "schema/**"
      - "ledger/**"
      - "examples/**"
      - "tools/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/ledger.yml"
  workflow_dispatch:

jobs:
  ledger:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest jsonschema

      - name: Run tests
        run: |
          pytest tests
